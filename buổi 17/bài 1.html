<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập hệ thống</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <style>
         :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --accent-color: #f97316;
            --page-bg: #020617;
        }
        
        body {
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--page-bg);
            color: #e5e7eb;
        }
        
        .login-page {
            min-height: 100vh;
        }
        
        .login-bg {
            position: relative;
            min-height: 260px;
            background: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.9)), url("https://images.unsplash.com/photo-1553877522-43269d4ea984?auto=format&fit=crop&w=1400&q=80") center/cover no-repeat;
            color: #f9fafb;
        }
        
        .login-bg-content {
            position: relative;
            z-index: 1;
        }
        
        .login-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 55%), radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.4), transparent 55%);
            opacity: 0.9;
        }
        
        .login-card-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
        }
        
        .login-card {
            max-width: 420px;
            width: 100%;
            background: radial-gradient(circle at top, rgba(37, 99, 235, 0.22), rgba(15, 23, 42, 0.96));
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: 0 26px 60px rgba(15, 23, 42, 0.95), 0 0 0 1px rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
        }
        
        label.form-label {
            font-size: 0.85rem;
            color: #e5e7eb;
            margin-bottom: 0.3rem;
        }
        
        .form-control {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            color: #e5e7eb;
            font-size: 0.9rem;
            padding: 0.65rem 0.9rem;
        }
        
        .form-control::placeholder {
            color: #6b7280;
            font-size: 0.85rem;
        }
        
        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.55);
            background: rgba(15, 23, 42, 1);
            color: #f9fafb;
        }
        
        .btn-login {
            background: var(--primary-color);
            border-color: var(--primary-color);
            width: 100%;
            padding: 0.7rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 999px;
            box-shadow: 0 14px 32px rgba(37, 99, 235, 0.6);
        }
        
        .btn-login:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
            box-shadow: 0 18px 40px rgba(30, 64, 175, 0.8);
        }
        
        .login-extra {
            font-size: 0.8rem;
        }
        
        .login-extra a {
            color: #a5b4fc;
            text-decoration: none;
        }
        
        .login-extra a:hover {
            text-decoration: underline;
        }
        
        @media (min-width: 992px) {
            .login-page {
                display: flex;
            }
            .login-bg {
                min-height: 100vh;
            }
        }
    </style>
</head>

<body>

    <div class="login-page">
        <div class="login-bg d-flex align-items-center">
            <div class="login-bg-content container py-5">
                <div class="row">
                    <div class="col-lg-7">
                        <h1 class="display-6 fw-bold mb-3">Chào mừng đến với hệ thống</h1>
                        <p class="mb-0 text-light small">
                            Trang đăng nhập mẫu cho bài lab 22, sử dụng Bootstrap 5 kết hợp custom CSS và ảnh nền để giao diện hiện đại, rõ ràng và responsive.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-card-wrapper flex-grow-1">
            <div class="login-card p-4 p-md-5">
                <div class="mb-3 text-center">
                    <h2 class="h4 fw-semibold mb-1">Đăng nhập</h2>
                    <p class="text-secondary small mb-0">
                        Nhập thông tin tài khoản để tiếp tục.
                    </p>
                </div>

                <form>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="nhapemail@vidu.com" />
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" />
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3 login-extra">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" />
                            <label class="form-check-label" for="remember">
              Ghi nhớ đăng nhập
            </label>
                        </div>
                        <a href="#">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn btn-login">
          Đăng nhập
        </button>
                </form>

                <p class="login-extra text-center mt-3 mb-0">
                    Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
